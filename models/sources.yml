version: 2

sources:
  - name: prod
    database: chainwalkers
    schema: prod
    tables:
      - name: solana_blocks
      - name: solana_txs
  - name: crosschain
    database: flipside_prod_db
    schema: silver_crosschain
    tables:
      - name: address_labels
  - name: shared
    database: flipside_prod_db
    schema: silver
    tables:
      - name: prices_v2
  - name: legacy_bronze
    database: flipside_prod_db
    schema: bronze
    tables: 
      - name: prod_nft_metadata_uploads_1828572827
  - name: solana_external
    schema: bronze
    loader: S3
    tables:
      - name: nft_metadata_api
        description: "External table of solana nft metadata files"
        external:
          location: "@solana.bronze.analytics_external_tables/{{target.database}}/NFT_METADATA_API"
          file_format: "( type = json, strip_outer_array = TRUE )"
          auto_refresh: true
